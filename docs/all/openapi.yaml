openapi: 3.0.0
info:
  title: DAKSA MVP API
  version: 1.0.0
servers:
  - url: http://localhost:5003/api
    description: Development
  - url: https://precya.com.br/api
    description: Production

paths:
  /auth/login:
    post:
      summary: Login com email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token gerado
        '401':
          description: Credenciais inválidas

  /schedules:
    get:
      summary: Listar agendamentos
      parameters:
        - name: status
          in: query
          schema:
            enum: [not_confirmed, confirmed, completed, canceled]
    post:
      summary: Criar agendamento
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                startTime:
                  type: string
                  format: date-time
                duration:
                  type: integer

  /clients:
    get:
      summary: Listar clientes
    post:
      summary: Criar cliente

  /protocols:
    get:
      summary: Listar protocolos
    post:
      summary: Criar protocolo
